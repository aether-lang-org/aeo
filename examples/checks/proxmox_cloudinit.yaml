#cloud-config
# proxmox_cloudinit.yaml — the aeo POST-PROVISION user-data: completes the node
# IN-GUEST via aeo-agent (the "doer"), NOT by baking a workload into the template.
#
# The debated design, realized: a proxmox_vm clones a GENERIC cloud image; this
# cloud-init (the irreducible first rung — the only thing that runs with zero guest
# cooperation) then:
#   1. installs qemu-guest-agent        -> makes /qemu/<id>/agent/* live, so aeo's
#                                          agent()-probe can confirm the guest is up;
#   2. FETCHES aeo-agent from GitHub Releases + VERIFIES a pinned SHA256 (attest()-
#      style, fail-closed — a tampered/wrong binary never runs);
#   3. STARTS aeo-agent (http mode, bound 0.0.0.0 so the parent reaches it across
#      the guest NIC) as the in-guest DOER — it runs the workload CONTAINER via
#      podman and reports outward;
#   4. installs podman IN THE BACKGROUND (must NOT block agent start — a learned
#      failure: podman via `packages:` delayed the agent past the health budget).
#
# WHY GitHub Releases: a PVE cicustom snippet is text-only and PVE has no snippet-
# write API, so the guest must FETCH the agent. Releases is a durable, globally-
# reachable, checksummed artifact host (built by .github/workflows/release-aeo-
# agent.yml). This adds NO reachability requirement beyond rung-1 (a guest that can
# apt-install already has outbound HTTPS).
#
# OPERATOR PLACEMENT (once, like the template):
#   scp examples/checks/proxmox_cloudinit.yaml root@<pve>:/var/lib/vz/snippets/aeo-agent-init.yaml
#   ssh root@<pve> "pvesm set local --content iso,vztmpl,backup,snippets"
# Then the composition uses cloud_init("local:snippets/aeo-agent-init.yaml") + agent(1).
#
# DEV vs PROD (honest — two known gaps, mechanism is fully proven):
#   - IDENTITY: this derives AEO_NODE from `hostname`, but a generic cloud image
#     boots as "localhost" unless cloud-init sets the hostname, so AEO_NODE comes
#     up "localhost" (proven live). PROD fix: the driver seeds the node name (PVE
#     cloud-init hostname, or a per-node vendor-data value) so AEO_NODE == the aeo
#     node name. The fetch/verify/run/container-doer path is IDENTICAL regardless.
#   - TOKEN: uses a DEV AEO_TOKEN below. PROD seals a PER-NODE token via lib/secrets
#     and seeds it here. Both gaps are the "production seeding" follow-up; neither
#     changes the doer mechanics this snippet proves.
#
# PINNED to an IMMUTABLE versioned release (aeo-agent-v0.1.1, asset
# aeo-agent-linux-x86_64-glibc). Releases are
# versioned-only (no rolling asset), so this URL + SHA never change under you — the
# fail-closed verify below stays valid for the life of this pin. To move to a new
# agent, cut a new `aeo-agent-v*` tag (CI prints its SHA in the job summary) and
# bump AEO_AGENT_URL + AEO_AGENT_SHA256 here.

package_update: true
packages:
  - qemu-guest-agent

write_files:
  # the in-guest bootstrap — kept as a file so runcmd stays readable and the pinned
  # values are in one place. AEO_BOOT_IMAGE/CMD are the workload container the agent
  # runs (here: a trivial long-lived busybox, the "/add would go here" placeholder).
  - path: /usr/local/bin/aeo-doer-boot.sh
    permissions: '0755'
    content: |
      #!/bin/sh
      set -eu
      log=/var/log/aeo-doer.log
      exec >>"$log" 2>&1
      echo "=== aeo-doer boot $(date -u +%s) ==="

      AEO_AGENT_URL="https://github.com/aether-lang-org/aeo/releases/download/aeo-agent-v0.1.1/aeo-agent-linux-x86_64-glibc"
      # Immutable versioned asset. The release ships the binary AND its .sha256 (CI
      # uploads both). We pin the EXPECTED sha here AND cross-check the published
      # .sha256 (defense in depth). NB CI builds are NOT bit-identical to a local
      # `ae build` (BuildID/paths differ), so this pin tracks the CI-PUBLISHED asset.
      AEO_AGENT_SHA256="a6713fc030e4826e07d4c768e031e628eb1b24370e56997fab89dddbf4347361"

      # 1. FETCH + VERIFY (fail-closed: a bad SHA aborts before chmod/run).
      curl -fsSL "$AEO_AGENT_URL" -o /usr/local/bin/aeo-agent
      # cross-check the pinned sha against the release's published .sha256 (defense
      # in depth; best-effort — the pinned `sha256sum -c` below is the hard gate).
      pub=$(curl -fsSL "${AEO_AGENT_URL}.sha256" 2>/dev/null | awk '{print $1}' || true)
      if [ -n "$pub" ] && [ "$pub" != "$AEO_AGENT_SHA256" ]; then
        echo "WARN: published .sha256 ($pub) != pinned ($AEO_AGENT_SHA256)"; fi
      echo "${AEO_AGENT_SHA256}  /usr/local/bin/aeo-agent" | sha256sum -c - \
        || { echo "SHA MISMATCH — refusing to run agent"; exit 1; }
      chmod +x /usr/local/bin/aeo-agent
      echo "agent fetched + verified"

      # 2. START the agent (http doer). AEO_NODE = the guest hostname (= VM name =
      #    the aeo node name). AEO_TOKEN is a DEV token (prod: sealed per-node).
      #    setsid so it survives cloud-init; 0.0.0.0 so the parent reaches it.
      AEO_TRANSPORT=http AEO_PORT=9450 AEO_BIND=0.0.0.0 \
        AEO_NODE="$(hostname)" AEO_TOKEN="aeo-dev-token" \
        AEO_BOOT_IMAGE="docker.io/library/busybox:latest" AEO_BOOT_CMD="sleep 864000" \
        setsid /usr/local/bin/aeo-agent >/var/log/aeo-agent.log 2>&1 &
      echo "agent started (node=$(hostname))"

      # 3. podman IN THE BACKGROUND (installing it here must NOT block agent start).
      #    READINESS ORDERING (proven live): agent-up != podman-ready. The agent
      #    serves /health + /dispatch immediately, but a `boot` that runs the
      #    workload CONTAINER fails until podman finishes installing (~1-2 min on
      #    first boot). The agent's DELEGATE path already waits/retries for podman;
      #    a direct boot does not — so a parent should treat "container workload
      #    ready" as gated on podman, not just on the agent answering /health.
      ( DEBIAN_FRONTEND=noninteractive apt-get update -qq \
        && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq podman ) \
        >/var/log/aeo-podman-install.log 2>&1 &
      echo "podman install backgrounded"

      # 4. proof marker aeo can read back over /agent/exec.
      echo "AEO_PROVISIONED node=$(hostname) ip=$(hostname -I | awk '{print $1}') at=$(date -u +%s)" \
        > /var/lib/aeo-provisioned

runcmd:
  - systemctl enable --now qemu-guest-agent
  - [ sh, -c, '/usr/local/bin/aeo-doer-boot.sh' ]
