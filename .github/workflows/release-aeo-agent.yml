# release-aeo-agent.yml — build aeo-agent (linux-amd64, STATIC) and publish it as a
# GitHub Release asset, so a proxmox_vm guest's cloud-init can `curl` the binary in
# (the aeo-agent "doer" delivery path) instead of baking it or shipping it over ssh.
#
# WHY a release asset: a PVE cicustom snippet is text-only and PVE has no snippet-
# write API, so the guest must FETCH the agent. GitHub Releases is a durable,
# globally-reachable, checksummed artifact host — the guest curls the asset and
# VERIFIES a pinned SHA256 before running it (attest()-style, fail-closed). See
# examples/checks/proxmox_cloudinit.yaml + docs.
#
# TRIGGER: a tag matching `aeo-agent-v*` (e.g. aeo-agent-v0.1.0). A DEDICATED tag
# prefix decouples releasing the agent from any aeo versioning. VERSIONED-ONLY:
# each tag is an IMMUTABLE release with its own asset + SHA — no rolling/overwritten
# asset, so a pinned SHA in the cloud-init snippet never breaks and every shipped
# agent is retained (rollback/bisect). The job prints the SHA256 in its summary so
# you can pin it. workflow_dispatch is a BUILD-ONLY dry run (no publish) for testing
# the build without cutting a tag.
#
# TARGET (in the asset name — linux/x86_64/static): a STATICALLY linked x86_64 ELF.
# WHY STATIC (2026-07-18, found by the death-forensics arm): the dynamic glibc
# build grew a libnghttp2.so.14 dependency (std.http-era growth) that
# debian:stable-slim — the agent-in-container base the recursive chain runs the
# agent in — does NOT ship, so a fresh dynamic agent exec'd there died exit 127
# and the whole nested chain broke. Static removes the ENTIRE runtime-deps axis:
# the same binary runs in a full guest OS, debian-slim, musl Alpine, and bare
# busybox (all four proven live). The agent needs no runtime NSS/DNS from libc
# (it binds IP literals and shells to curl), so the static-glibc getaddrinfo
# caveat doesn't apply. The build step ASSERTS arch+static so the name can't
# lie. An arm64 guest needs its own matching asset (aeo-agent-linux-aarch64-
# static) — a build-matrix follow-up.

name: release-aeo-agent

on:
  push:
    tags:
      - 'aeo-agent-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional: aether ref (tag/branch/sha) to build the toolchain from'
        required: false
        default: ''

permissions:
  contents: write        # create the release + upload the asset

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aeo
        uses: actions/checkout@v4

      - name: Install build prerequisites
        # libssl-dev + libnghttp2-dev provide the STATIC archives (libssl.a,
        # libcrypto.a, libnghttp2.a) the -static link needs.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl tar libssl-dev libnghttp2-dev

      - name: Install the Aether toolchain (ae)
        # get.sh builds ae from source (Aether -> C -> make); no chicken-and-egg.
        # AETHER_REF pins the toolchain version (input, else the latest tag).
        # Install to $HOME/.local (get.sh's default, user-writable — a PREFIX of
        # /usr/local needs root and 'install' fails "Operation not permitted" on the
        # runner), then add its bin to PATH for later steps.
        run: |
          curl -sSL https://raw.githubusercontent.com/aether-lang-org/aether/main/get.sh \
            | AETHER_REF="${{ github.event.inputs.ref }}" PREFIX="$HOME/.local" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify ae is on PATH
        run: ae --version

      - name: Build aeo-agent (linux, x86_64, static)
        # AE_CC carries the -static: ae hands it to the C-compile+link step.
        # (Proven locally: AE_CC="gcc -static" -> "not a dynamic executable",
        # and the result serves /health in debian-slim, alpine AND busybox.)
        run: |
          AE_CC="gcc -static" ae build bin/aeo-agent.ae -o aeo-agent-linux-x86_64-static --lib lib
          file aeo-agent-linux-x86_64-static
          # ASSERT the name is honest: the asset says linux-x86_64-static, so fail
          # the build if it isn't. Static == no interpreter, no runtime .so deps —
          # the exact axis a dynamic build silently breaks on (the exit-127 trap).
          file aeo-agent-linux-x86_64-static | grep -q 'ELF 64-bit.*x86-64' \
            || { echo "not an x86_64 ELF — asset name would be a lie"; exit 1; }
          file aeo-agent-linux-x86_64-static | grep -q 'statically linked' \
            || { echo "not statically linked — asset name would be a lie (the exit-127 trap returns)"; exit 1; }
          chmod +x aeo-agent-linux-x86_64-static

      - name: Checksum
        id: sum
        run: |
          sha256sum aeo-agent-linux-x86_64-static | tee aeo-agent-linux-x86_64-static.sha256
          echo "sha256=$(cut -d' ' -f1 aeo-agent-linux-x86_64-static.sha256)" >> "$GITHUB_OUTPUT"

      - name: Summary (pin this SHA256 in the cloud-init snippet)
        run: |
          {
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "### aeo-agent ${{ github.ref_name }} released"
            else
              echo "### aeo-agent BUILD-ONLY (workflow_dispatch dry run — not published)"
              echo ""
              echo "Cut a tag to publish: \`git tag aeo-agent-vX.Y.Z && git push origin aeo-agent-vX.Y.Z\`"
            fi
            echo ""
            echo "- asset: \`aeo-agent-linux-x86_64-static\`"
            echo "- **SHA256:** \`${{ steps.sum.outputs.sha256 }}\`"
            echo ""
            echo "Pin it in the guest cloud-init: \`AEO_AGENT_SHA256=${{ steps.sum.outputs.sha256 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create the GitHub Release (tags only — immutable, versioned)
        # Publish ONLY on a real tag. A workflow_dispatch run builds + checksums
        # (the steps above) but does NOT publish — so there is never a rolling/
        # overwritten asset; every release is an immutable versioned tag.
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aeo-agent-linux-x86_64-static
            aeo-agent-linux-x86_64-static.sha256
          tag_name: ${{ github.ref_name }}
          body: |
            aeo-agent (linux, x86_64, STATIC) — the in-guest orchestration agent a
            proxmox_vm fetches via cloud-init to complete its node and run its
            workload container. Statically linked: the same binary runs in a full
            guest OS, debian-slim, musl Alpine, or busybox (no runtime .so deps —
            the agent-in-container path depends on this).

            **Asset:** `aeo-agent-linux-x86_64-static`
            **SHA256:** `${{ steps.sum.outputs.sha256 }}`

            Verify + run in cloud-init:
            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aeo-agent-linux-x86_64-static -o /usr/local/bin/aeo-agent
            echo "${{ steps.sum.outputs.sha256 }}  /usr/local/bin/aeo-agent" | sha256sum -c -
            chmod +x /usr/local/bin/aeo-agent
            ```
