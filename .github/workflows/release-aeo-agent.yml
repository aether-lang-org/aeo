# release-aeo-agent.yml — build aeo-agent (linux-amd64, glibc) and publish it as a
# GitHub Release asset, so a proxmox_vm guest's cloud-init can `curl` the binary in
# (the aeo-agent "doer" delivery path) instead of baking it or shipping it over ssh.
#
# WHY a release asset: a PVE cicustom snippet is text-only and PVE has no snippet-
# write API, so the guest must FETCH the agent. GitHub Releases is a durable,
# globally-reachable, checksummed artifact host — the guest curls the asset and
# VERIFIES a pinned SHA256 before running it (attest()-style, fail-closed). See
# examples/checks/proxmox_cloudinit.yaml + docs.
#
# TRIGGER: a tag matching `aeo-agent-v*` (e.g. aeo-agent-v0.1.0). A DEDICATED tag
# prefix decouples releasing the agent from any aeo versioning. VERSIONED-ONLY:
# each tag is an IMMUTABLE release with its own asset + SHA — no rolling/overwritten
# asset, so a pinned SHA in the cloud-init snippet never breaks and every shipped
# agent is retained (rollback/bisect). The job prints the SHA256 in its summary so
# you can pin it. workflow_dispatch is a BUILD-ONLY dry run (no publish) for testing
# the build without cutting a tag.
#
# TARGET (in the asset name — linux/x86_64/glibc): builds on ubuntu-latest -> a
# dynamically-linked x86_64 glibc ELF (interpreter /lib64/ld-linux-x86-64.so.2),
# which is what a Debian/Ubuntu cloud image runs. libc is IN THE NAME on purpose:
# it's the axis that silently breaks — a glibc binary won't run on a musl guest
# (Alpine). The build step ASSERTS arch+libc so the name can't lie. A musl or arm64
# guest needs its own matching asset (aeo-agent-linux-x86_64-musl / -aarch64-glibc)
# — a build-matrix follow-up.

name: release-aeo-agent

on:
  push:
    tags:
      - 'aeo-agent-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional: aether ref (tag/branch/sha) to build the toolchain from'
        required: false
        default: ''

permissions:
  contents: write        # create the release + upload the asset

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aeo
        uses: actions/checkout@v4

      - name: Install build prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl tar

      - name: Install the Aether toolchain (ae)
        # get.sh builds ae from source (Aether -> C -> make); no chicken-and-egg.
        # AETHER_REF pins the toolchain version (input, else the latest tag).
        # Install to $HOME/.local (get.sh's default, user-writable — a PREFIX of
        # /usr/local needs root and 'install' fails "Operation not permitted" on the
        # runner), then add its bin to PATH for later steps.
        run: |
          curl -sSL https://raw.githubusercontent.com/aether-lang-org/aether/main/get.sh \
            | AETHER_REF="${{ github.event.inputs.ref }}" PREFIX="$HOME/.local" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify ae is on PATH
        run: ae --version

      - name: Build aeo-agent (linux, x86_64, glibc)
        run: |
          ae build bin/aeo-agent.ae -o aeo-agent-linux-x86_64-glibc --lib lib
          file aeo-agent-linux-x86_64-glibc
          # ASSERT the name is honest: the asset says linux-x86_64-glibc, so fail
          # the build if it isn't. glibc == the /lib64/ld-linux-x86-64.so.2 loader
          # (musl would be ld-musl-x86_64.so.1 and would silently not run on a glibc
          # guest — the exact trap the libc-in-the-name is meant to prevent).
          file aeo-agent-linux-x86_64-glibc | grep -q 'ELF 64-bit.*x86-64' \
            || { echo "not an x86_64 ELF — asset name would be a lie"; exit 1; }
          file aeo-agent-linux-x86_64-glibc | grep -q 'ld-linux-x86-64' \
            || { echo "not glibc-linked (musl?) — asset name would be a lie"; exit 1; }
          chmod +x aeo-agent-linux-x86_64-glibc

      - name: Checksum
        id: sum
        run: |
          sha256sum aeo-agent-linux-x86_64-glibc | tee aeo-agent-linux-x86_64-glibc.sha256
          echo "sha256=$(cut -d' ' -f1 aeo-agent-linux-x86_64-glibc.sha256)" >> "$GITHUB_OUTPUT"

      - name: Summary (pin this SHA256 in the cloud-init snippet)
        run: |
          {
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "### aeo-agent ${{ github.ref_name }} released"
            else
              echo "### aeo-agent BUILD-ONLY (workflow_dispatch dry run — not published)"
              echo ""
              echo "Cut a tag to publish: \`git tag aeo-agent-vX.Y.Z && git push origin aeo-agent-vX.Y.Z\`"
            fi
            echo ""
            echo "- asset: \`aeo-agent-linux-x86_64-glibc\`"
            echo "- **SHA256:** \`${{ steps.sum.outputs.sha256 }}\`"
            echo ""
            echo "Pin it in the guest cloud-init: \`AEO_AGENT_SHA256=${{ steps.sum.outputs.sha256 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create the GitHub Release (tags only — immutable, versioned)
        # Publish ONLY on a real tag. A workflow_dispatch run builds + checksums
        # (the steps above) but does NOT publish — so there is never a rolling/
        # overwritten asset; every release is an immutable versioned tag.
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aeo-agent-linux-x86_64-glibc
            aeo-agent-linux-x86_64-glibc.sha256
          tag_name: ${{ github.ref_name }}
          body: |
            aeo-agent (linux-amd64, glibc) — the in-guest orchestration agent a
            proxmox_vm fetches via cloud-init to complete its node and run its
            workload container.

            **SHA256:** `${{ steps.sum.outputs.sha256 }}`

            Verify + run in cloud-init:
            ```
            curl -fsSL <this-asset-url> -o /usr/local/bin/aeo-agent
            echo "<sha256>  /usr/local/bin/aeo-agent" | sha256sum -c -
            chmod +x /usr/local/bin/aeo-agent
            ```
