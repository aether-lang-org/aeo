# release-aeo-agent.yml — build aeo-agent (linux-amd64, STATIC) and publish it as a
# GitHub Release asset, so a proxmox_vm guest's cloud-init can `curl` the binary in
# (the aeo-agent "doer" delivery path) instead of baking it or shipping it over ssh.
#
# WHY a release asset: a PVE cicustom snippet is text-only and PVE has no snippet-
# write API, so the guest must FETCH the agent. GitHub Releases is a durable,
# globally-reachable, checksummed artifact host — the guest curls the asset and
# VERIFIES a pinned SHA256 before running it (attest()-style, fail-closed). See
# examples/checks/proxmox_cloudinit.yaml + docs.
#
# TRIGGER: a tag matching `aeo-agent-v*` (e.g. aeo-agent-v0.1.0). A DEDICATED tag
# prefix decouples releasing the agent from any aeo versioning. VERSIONED-ONLY:
# each tag is an IMMUTABLE release with its own asset + SHA — no rolling/overwritten
# asset, so a pinned SHA in the cloud-init snippet never breaks and every shipped
# agent is retained (rollback/bisect). The job prints the SHA256 in its summary so
# you can pin it. workflow_dispatch is a BUILD-ONLY dry run (no publish) for testing
# the build without cutting a tag.
#
# TARGET (in the asset name — linux/x86_64/static): a STATICALLY linked x86_64 ELF.
# WHY STATIC (2026-07-18, found by the death-forensics arm): the dynamic glibc
# build grew a libnghttp2.so.14 dependency (std.http-era growth) that
# debian:stable-slim — the agent-in-container base the recursive chain runs the
# agent in — does NOT ship, so a fresh dynamic agent exec'd there died exit 127
# and the whole nested chain broke. Static removes the ENTIRE runtime-deps axis:
# the same binary runs in a full guest OS, debian-slim, musl Alpine, and bare
# busybox (all four proven live). The agent needs no runtime NSS/DNS from libc
# (it binds IP literals and shells to curl), so the static-glibc getaddrinfo
# caveat doesn't apply. The build step ASSERTS arch+static so the name can't
# lie. An arm64 guest needs its own matching asset (aeo-agent-linux-aarch64-
# static) — a build-matrix follow-up.

name: release-aeo-agent

on:
  push:
    tags:
      - 'aeo-agent-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional: aether ref (tag/branch/sha) to build the toolchain from'
        required: false
        default: ''

permissions:
  contents: write        # create the release + upload the asset

# THREE build jobs feed one release job:
#   build-linux    — native x86_64, STATIC (gcc -static). The load-bearing asset.
#   build-freebsd  — x86_64 FreeBSD, CROSS-compiled via zig. Serves bhyve guests.
#                    Self-gates on the ae FreeBSD-cross pthread fix (see there).
#   build-windows  — x86_64 Windows, CROSS-compiled via zig. Serves Win11 guests
#                    (the agent driver_windows path: workload via WSL2+podman).
#                    No sysroot/base/gate needed (Tier-A + plaintext agent).
#   All three PROVEN end-to-end: cross-built on Linux, run on a real box of that
#   OS and serve /health=ok (FreeBSD 15 box, Win11 VM).
# The release job downloads every produced artifact and publishes them one tag.

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sum.outputs.sha256 }}
    steps:
      - name: Checkout aeo
        uses: actions/checkout@v4

      - name: Install build prerequisites
        # libssl-dev + libnghttp2-dev provide the STATIC archives (libssl.a,
        # libcrypto.a, libnghttp2.a) the -static link needs.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl tar libssl-dev libnghttp2-dev

      - name: Install the Aether toolchain (ae)
        # get.sh builds ae from source (Aether -> C -> make); no chicken-and-egg.
        # AETHER_REF pins the toolchain version (input, else the latest tag).
        # Install to $HOME/.local (get.sh's default, user-writable — a PREFIX of
        # /usr/local needs root and 'install' fails "Operation not permitted" on the
        # runner), then add its bin to PATH for later steps.
        run: |
          curl -sSL https://raw.githubusercontent.com/aether-lang-org/aether/main/get.sh \
            | AETHER_REF="${{ github.event.inputs.ref }}" PREFIX="$HOME/.local" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify ae is on PATH
        run: ae --version

      - name: Build aeo-agent (linux, x86_64, static)
        # AE_CC carries the -static: ae hands it to the C-compile+link step.
        # (Proven locally: AE_CC="gcc -static" -> "not a dynamic executable",
        # and the result serves /health in debian-slim, alpine AND busybox.)
        run: |
          AE_CC="gcc -static" ae build bin/aeo-agent.ae -o aeo-agent-linux-x86_64-static --lib lib
          file aeo-agent-linux-x86_64-static
          # ASSERT the name is honest: the asset says linux-x86_64-static, so fail
          # the build if it isn't. Static == no interpreter, no runtime .so deps —
          # the exact axis a dynamic build silently breaks on (the exit-127 trap).
          file aeo-agent-linux-x86_64-static | grep -q 'ELF 64-bit.*x86-64' \
            || { echo "not an x86_64 ELF — asset name would be a lie"; exit 1; }
          file aeo-agent-linux-x86_64-static | grep -q 'statically linked' \
            || { echo "not statically linked — asset name would be a lie (the exit-127 trap returns)"; exit 1; }
          chmod +x aeo-agent-linux-x86_64-static

      - name: Checksum
        id: sum
        run: |
          sha256sum aeo-agent-linux-x86_64-static | tee aeo-agent-linux-x86_64-static.sha256
          echo "sha256=$(cut -d' ' -f1 aeo-agent-linux-x86_64-static.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeo-agent-linux-x86_64-static
          path: |
            aeo-agent-linux-x86_64-static
            aeo-agent-linux-x86_64-static.sha256
          if-no-files-found: error

  build-freebsd:
    # x86_64 FreeBSD, cross-compiled on the Linux runner. Runs bhyve guests.
    #
    # GATED on the aether toolchain carrying the FreeBSD-cross pthread fix
    # (tools/ae.c: link libthr.so.3 BY PATH in fbsd_link — -lpthread does NOT
    # resolve under zig-lld + -nostdlib against a split base sysroot). Without
    # that fix the link dies `undefined symbol: pthread_create`. Set
    # AEO_FREEBSD_MIN_AE to the first ae version that ships the fix and this job
    # SKIPS itself (with a clear note) on older toolchains rather than failing a
    # tag. Bump/remove the gate once that ae version is released & pinned.
    #
    # DYNAMIC (not static): links the base sysroot's libc.so.7 + libthr.so.3.
    # FreeBSD has no stable static-libc story the way musl/Alpine does; a bhyve
    # guest is a full FreeBSD userland, so the base libs are always present —
    # the static-in-busybox concern that drives the linux asset doesn't apply.
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sum.outputs.sha256 }}
      built: ${{ steps.build.outputs.built }}
    env:
      # First ae version whose --target=x86_64-freebsd includes the libthr fix.
      # TODO: set to the real released version, then this gate self-clears.
      AEO_FREEBSD_MIN_AE: '0.428.0'
      CROSSBUILD_REPO: https://github.com/aether-lang-org/aether-crossbuild.git
    steps:
      - name: Checkout aeo
        uses: actions/checkout@v4

      - name: Install build prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl tar

      - name: Install the Aether toolchain (ae)
        run: |
          curl -sSL https://raw.githubusercontent.com/aether-lang-org/aether/main/get.sh \
            | AETHER_REF="${{ github.event.inputs.ref }}" PREFIX="$HOME/.local" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Gate on ae version (skip cleanly if the FreeBSD fix isn't in yet)
        id: gate
        run: |
          have=$(ae --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          need="$AEO_FREEBSD_MIN_AE"
          low=$(printf '%s\n%s\n' "$have" "$need" | sort -V | head -1)
          if [ "$have" != "$need" ] && [ "$low" = "$have" ]; then
            echo "ae $have < $need — FreeBSD cross fix (libthr.so.3) not in this toolchain; skipping FreeBSD asset."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ae $have >= $need — building FreeBSD asset."
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Provision the FreeBSD base sysroot + third-party deps (aether-crossbuild)
        if: steps.gate.outputs.ok == 'true'
        # The base sysroot (libc.so.7 + libthr.so.3 + CRT) is what zig lacks for
        # FreeBSD; the deps (openssl/zlib/pcre2) come from provision.sh. nghttp2
        # is intentionally omitted — it fails to cross-build for freebsd (gid_t
        # macro poisoning) AND the plaintext agent doesn't need it (no HTTP/2).
        run: |
          git clone --depth 1 "$CROSSBUILD_REPO" "$HOME/aether-crossbuild"
          cd "$HOME/aether-crossbuild"
          # zig is the cross-compiler provision.sh links with — it does NOT
          # auto-fetch it, so pull the pinned toolchain first (into ./toolchain/,
          # the dir added to PATH below).
          ./scripts/get-zig.sh
          ./scripts/fetch-freebsd-base.sh x86_64 15
          CB_LIBS="zlib pcre2 openssl" ./provision.sh x86_64-freebsd15
          echo "AETHER_SYSROOT=$HOME/aether-crossbuild/bases/x86_64-freebsd15" >> "$GITHUB_ENV"
          echo "CROSSBUILD_SYSROOT=$HOME/aether-crossbuild/sysroots/x86_64-freebsd15" >> "$GITHUB_ENV"
          echo "$HOME/aether-crossbuild/toolchain/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"

      - name: Build aeo-agent (freebsd, x86_64)
        id: build
        if: steps.gate.outputs.ok == 'true'
        run: |
          ae build bin/aeo-agent.ae -o aeo-agent-freebsd-x86_64 --lib lib --target=x86_64-freebsd
          file aeo-agent-freebsd-x86_64
          # ASSERT the name is honest: a real FreeBSD ELF for x86_64.
          file aeo-agent-freebsd-x86_64 | grep -q 'ELF 64-bit.*x86-64' \
            || { echo "not an x86_64 ELF — asset name would be a lie"; exit 1; }
          file aeo-agent-freebsd-x86_64 | grep -qi 'FreeBSD' \
            || { echo "not a FreeBSD binary — asset name would be a lie"; exit 1; }
          chmod +x aeo-agent-freebsd-x86_64
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Checksum
        id: sum
        if: steps.gate.outputs.ok == 'true'
        run: |
          sha256sum aeo-agent-freebsd-x86_64 | tee aeo-agent-freebsd-x86_64.sha256
          echo "sha256=$(cut -d' ' -f1 aeo-agent-freebsd-x86_64.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: steps.gate.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aeo-agent-freebsd-x86_64
          path: |
            aeo-agent-freebsd-x86_64
            aeo-agent-freebsd-x86_64.sha256
          if-no-files-found: error

  build-windows:
    # x86_64 Windows, cross-compiled on the Linux runner via zig. Serves Win11
    # guests (bhyve; docs/aeo-agent-windows-pipeline.md). The agent's Windows
    # code path is real: it imports driver_windows and platform()-dispatches the
    # workload to `wsl -d <distro> -- podman ...` (bin/aeo-agent.ae ~320); the
    # linux arm uses podman directly. Same protocol/transport/boot core.
    #
    # NO crossbuild sysroot, NO base, NO version gate: Windows is Tier-A (zig
    # bundles the Windows CRT/libc), the agent is plaintext HTTP (no OpenSSL /
    # nghttp2 to link), and `ae --target=x86_64-windows` has shipped since 0.427.
    # So this is just: get ae, get zig, cross-build. Proven end-to-end: the .exe
    # runs on a real Win11 box and serves /health=ok.
    #
    # DYNAMIC vs the Windows system DLLs (kernel32/ws2_32/…) — always present in
    # any Windows guest; the static-in-busybox concern doesn't apply.
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sum.outputs.sha256 }}
      built: ${{ steps.build.outputs.built }}
    env:
      ZIG_VERSION: '0.13.0'
    steps:
      - name: Checkout aeo
        uses: actions/checkout@v4

      - name: Install build prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl tar xz-utils

      - name: Install the Aether toolchain (ae)
        run: |
          curl -sSL https://raw.githubusercontent.com/aether-lang-org/aether/main/get.sh \
            | AETHER_REF="${{ github.event.inputs.ref }}" PREFIX="$HOME/.local" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install zig (the cross-compiler ae --target drives)
        run: |
          zdir="zig-linux-x86_64-${ZIG_VERSION}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${zdir}.tar.xz" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C "$HOME"
          echo "$HOME/${zdir}" >> "$GITHUB_PATH"

      - name: Build aeo-agent (windows, x86_64)
        id: build
        # No CROSSBUILD_SYSROOT: the plaintext agent needs no OpenSSL/zlib/etc.,
        # and zig bundles the Windows CRT. -> a self-contained .exe.
        run: |
          ae build bin/aeo-agent.ae -o aeo-agent-windows-x86_64.exe --lib lib --target=x86_64-windows
          file aeo-agent-windows-x86_64.exe
          # ASSERT the name is honest: a real x86-64 Windows PE.
          file aeo-agent-windows-x86_64.exe | grep -q 'PE32+ executable' \
            || { echo "not a Windows PE — asset name would be a lie"; exit 1; }
          file aeo-agent-windows-x86_64.exe | grep -q 'x86-64' \
            || { echo "not x86-64 — asset name would be a lie"; exit 1; }
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Checksum
        id: sum
        run: |
          sha256sum aeo-agent-windows-x86_64.exe | tee aeo-agent-windows-x86_64.exe.sha256
          echo "sha256=$(cut -d' ' -f1 aeo-agent-windows-x86_64.exe.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeo-agent-windows-x86_64
          path: |
            aeo-agent-windows-x86_64.exe
            aeo-agent-windows-x86_64.exe.sha256
          if-no-files-found: error

  release:
    needs: [build-linux, build-freebsd, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Summary (pin these SHA256s in the cloud-init snippet)
        run: |
          {
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "### aeo-agent ${{ github.ref_name }} released"
            else
              echo "### aeo-agent BUILD-ONLY (workflow_dispatch dry run — not published)"
              echo ""
              echo "Cut a tag to publish: \`git tag aeo-agent-vX.Y.Z && git push origin aeo-agent-vX.Y.Z\`"
            fi
            echo ""
            echo "| asset | SHA256 |"
            echo "|---|---|"
            echo "| \`aeo-agent-linux-x86_64-static\` | \`${{ needs.build-linux.outputs.sha256 }}\` |"
            echo "| \`aeo-agent-windows-x86_64.exe\` | \`${{ needs.build-windows.outputs.sha256 }}\` |"
            if [ "${{ needs.build-freebsd.outputs.built }}" = "true" ]; then
              echo "| \`aeo-agent-freebsd-x86_64\` | \`${{ needs.build-freebsd.outputs.sha256 }}\` |"
            else
              echo ""
              echo "> FreeBSD asset SKIPPED — the ae toolchain predates the FreeBSD-cross pthread fix (see build-freebsd gate)."
            fi
            echo ""
            echo "Pin in the guest cloud-init: \`AEO_AGENT_SHA256=<the row for your guest OS/arch>\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create the GitHub Release (tags only — immutable, versioned)
        # Publish ONLY on a real tag. workflow_dispatch builds + checksums but
        # does NOT publish — so there is never a rolling/overwritten asset; every
        # release is an immutable versioned tag. `files` globs whatever artifacts
        # the build jobs produced, so a skipped FreeBSD job simply omits its asset
        # instead of failing the release.
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aeo-agent-linux-x86_64-static
            dist/aeo-agent-linux-x86_64-static.sha256
            dist/aeo-agent-windows-x86_64.exe
            dist/aeo-agent-windows-x86_64.exe.sha256
            dist/aeo-agent-freebsd-x86_64
            dist/aeo-agent-freebsd-x86_64.sha256
          fail_on_unmatched_files: false
          tag_name: ${{ github.ref_name }}
          body: |
            aeo-agent — the in-guest orchestration agent a guest fetches via
            cloud-init (or ssh push) to complete its node and run its workload.

            **Assets** (fetch the row matching your guest OS + arch):

            | asset | guest | linkage |
            |---|---|---|
            | `aeo-agent-linux-x86_64-static` | any Linux (full OS, debian-slim, Alpine/musl, busybox) | STATIC — no runtime .so deps |
            | `aeo-agent-windows-x86_64.exe` | Windows (Win11 bhyve guests; workload via WSL2+podman) | dynamic vs Windows system DLLs (always present) |
            | `aeo-agent-freebsd-x86_64` | FreeBSD (bhyve guests) | dynamic vs the base libc.so.7 + libthr.so.3 (always present in a FreeBSD userland) |

            SHA256s are printed in the run summary and in each `<asset>.sha256`.

            Verify + run in cloud-init (linux example):
            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aeo-agent-linux-x86_64-static -o /usr/local/bin/aeo-agent
            echo "${{ needs.build-linux.outputs.sha256 }}  /usr/local/bin/aeo-agent" | sha256sum -c -
            chmod +x /usr/local/bin/aeo-agent
            ```
